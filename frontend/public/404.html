<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simul Portfolio</title>
  <script>
    // GitHub Pages SPA redirect
    // Store the full path/params in sessionStorage and redirect to index
    (function() {
      var l = window.location;
      var redirect = l.pathname + l.search + l.hash;
      sessionStorage.setItem('gh-redirect', redirect);
      l.replace('/');
    })();
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
